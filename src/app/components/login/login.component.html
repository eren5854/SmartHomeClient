 <!--=============== LOGIN ===============-->
 <div class="login container grid" id="loginAccessRegister">
    <!--===== LOGIN ACCESS =====-->
    <div class="login__access">
       <h1 class="login__title">Log in to your account.</h1>
       
       <div class="login__area">
          <form #loginForm="ngForm" (ngSubmit)="login(loginForm)" class="login__form"  >
             <div class="login__content grid">
                <div class="login__box">
                   <input [(ngModel)]="loginModel.emailOrUserName" type="email" id="emailOrUserName" name="emailOrUserName" required placeholder=" " class="login__input">
                   <label for="emailOrUserName" class="login__label">Email</label>
       
                   <i class="ri-mail-fill login__icon"></i>
                </div>
    
                <div class="login__box">
                    <input [(ngModel)]="loginModel.password" type="password" id="password" name="password" required placeholder=" " class="login__input">
                    <label for="password" class="login__label">Password</label>
                    <i class="ri-eye-off-fill login__icon login__password" 
                       id="loginPassword"
                       (click)="togglePasswordVisibility('password', 'loginPassword')"></i>
                  </div>
             </div>
    
             <a href="#" class="login__forgot">Forgot your password?</a>
    
             <button type="submit" class="login__button">Login</button>
          </form>
 
          <div class="login__social">
             <p class="login__social-title">Or login with</p>
 
             <div class="login__social-links">
                <a href="#" class="login__social-link">
                   <img src="/assets/img/icon-google.svg" alt="image" class="login__social-img">
                </a>
 
                <a href="#" class="login__social-link">
                   <img src="/assets/img/icon-facebook.svg" alt="image" class="login__social-img">
                </a>
 
                <a href="#" class="login__social-link">
                   <img src="/assets/img/icon-apple.svg" alt="image" class="login__social-img">
                </a>
             </div>
          </div>
 
          <p class="login__switch">
            Don't have an account? 
            <button (click)="switchToRegister()">Create Account</button>
          </p>
       </div>
    </div>

    <!--===== LOGIN REGISTER =====-->
    <div class="login__register">
       <h1 class="login__title">Create new account.</h1>

       <div class="login__area">
          <form #signupForm="ngForm" (ngSubmit)="signup(signupForm)" class="login__form">
             <div class="login__content grid">
                <div class="login__group grid">
                   <div class="login__box">
                      <input [(ngModel)]="userModel.firstName" type="text" id="firstName" name="firstName" required placeholder=" " class="login__input">
                      <label for="firstName" class="login__label">Names</label>
 
                      <i class="ri-id-card-fill login__icon"></i>
                   </div>
 
                   <div class="login__box">
                      <input [(ngModel)]="userModel.lastName" type="text" id="lastName" name="lastName" required placeholder=" " class="login__input">
                      <label for="lastName" class="login__label">Surnames</label>
 
                      <i class="ri-id-card-fill login__icon"></i>
                   </div>
                </div>

                <div class="login__box">
                    <input [(ngModel)]="userModel.userName" type="email" id="userName" name="userName" required placeholder=" " class="login__input">
                    <label for="userName" class="login__label">User Name</label>
 
                    <i class="ri-mail-fill login__icon"></i>
                 </div>

                <div class="login__box">
                   <input [(ngModel)]="userModel.email" type="email" id="email" name="email" required placeholder=" " class="login__input">
                   <label for="email" class="login__label">Email</label>

                   <i class="ri-mail-fill login__icon"></i>
                </div>

                <div class="login__box">
                    <input [(ngModel)]="userModel.password" type="password" id="password" name="password" required placeholder=" " class="login__input">
                    <label for="password" class="login__label">Password</label>
                    <i class="ri-eye-off-fill login__icon login__password" 
                       id="loginPasswordCreate"
                       (click)="togglePasswordVisibility('passwordCreate', 'loginPasswordCreate')"></i>
                  </div>
             </div>

             <button type="submit" class="login__button">Create account</button>
          </form>

          <p class="login__switch">
            Already have an account? 
            <button (click)="switchToLogin()">Log In</button>
          </p>
       </div>
    </div>
 </div>
